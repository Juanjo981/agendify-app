<div class="cc-card" (click)="ver.emit(cita)" role="button" tabindex="0">

  <!-- Header -->
  <div class="cc-header">
    <div class="cc-patient">
      <div class="cc-avatar">{{ iniciales }}</div>
      <div class="cc-patient__info">
        <span class="cc-patient__name">{{ pacienteNombre }}</span>
        <span class="cc-patient__motivo">{{ cita.motivo }}</span>
      </div>
    </div>
    <app-estado-badge [estado]="cita.estado"></app-estado-badge>
  </div>

  <!-- Meta -->
  <div class="cc-meta">
    <div class="cc-meta__item">
      <ion-icon name="calendar-outline"></ion-icon>
      <span>{{ formatFecha(cita.fecha) }}</span>
    </div>
    <div class="cc-meta__item">
      <ion-icon name="time-outline"></ion-icon>
      <span>{{ cita.hora_inicio }} – {{ cita.hora_fin }}</span>
    </div>
    <div class="cc-meta__item">
      <ion-icon name="hourglass-outline"></ion-icon>
      <span>{{ cita.duracion }} min</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="cc-footer">
    <app-pago-badge [estado]="cita.estado_pago"></app-pago-badge>
    <span class="cc-monto">{{ formatMonto(cita.monto) }}</span>
    <div class="cc-footer__actions">
      <button
        class="cc-action-btn"
        (click)="editar.emit(cita); $event.stopPropagation()"
        title="Editar cita"
      >
        <ion-icon name="pencil-outline"></ion-icon>
      </button>
      <button
        class="cc-action-btn cc-action-btn--view"
        (click)="ver.emit(cita); $event.stopPropagation()"
        title="Ver detalle"
      >
        <ion-icon name="eye-outline"></ion-icon>
      </button>
    </div>
  </div>

</div>
