<div class="ccp-card">

  <div class="ccp-header">
    <div class="ccp-header__left">
      <h3 class="ccp-title">Citas por período</h3>
      <p class="ccp-subtitle">{{ subtituloVista }}</p>
    </div>
    <div class="ccp-tabs">
      <button
        *ngFor="let t of periodoTabs"
        type="button"
        class="ccp-tab"
        [class.ccp-tab--active]="periodoActivo === t.value"
        (click)="cambiarPeriodo(t.value)">
        {{ t.label }}
      </button>
    </div>
  </div>

  <div class="ccp-chart-wrap">
    <div class="ccp-chart-area ccp-chart-area--canvas">
      <canvas #chartCitas [attr.aria-label]="'Gráfico de citas — vista ' + periodoActivo"></canvas>
    </div>
  </div>

  <div class="ccp-footer-stats">
    <div class="ccp-stat">
      <div class="ccp-stat__icon-wrap ccp-stat__icon-wrap--primary">
        <ion-icon name="calendar-outline"></ion-icon>
      </div>
      <div class="ccp-stat__body">
        <span class="ccp-stat__value">{{ resumen.totalPeriodo }}</span>
        <span class="ccp-stat__label">Total período</span>
      </div>
    </div>

    <div class="ccp-stat">
      <div class="ccp-stat__icon-wrap ccp-stat__icon-wrap--success">
        <ion-icon name="ribbon-outline"></ion-icon>
      </div>
      <div class="ccp-stat__body">
        <span class="ccp-stat__value">{{ resumen.estadoPredominante }}</span>
        <span class="ccp-stat__label">Estado predominante</span>
      </div>
    </div>

    <div class="ccp-stat">
      <div class="ccp-stat__icon-wrap ccp-stat__icon-wrap--info">
        <ion-icon name="time-outline"></ion-icon>
      </div>
      <div class="ccp-stat__body">
        <span class="ccp-stat__value">{{ resumen.horasMasOcupadas[0]?.hora || '—' }}</span>
        <span class="ccp-stat__label">Hora más ocupada</span>
      </div>
    </div>

    <div class="ccp-stat">
      <div class="ccp-stat__icon-wrap ccp-stat__icon-wrap--purple">
        <ion-icon name="today-outline"></ion-icon>
      </div>
      <div class="ccp-stat__body">
        <span class="ccp-stat__value">{{ resumen.diasMasOcupados[0]?.dia || '—' }}</span>
        <span class="ccp-stat__label">Día más ocupado</span>
      </div>
    </div>
  </div>

</div>
