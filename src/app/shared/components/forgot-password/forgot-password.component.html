<!-- ── Backdrop ───────────────────────────────────────────────────────────── -->
<div class="fpd-backdrop" (click)="close()"></div>

<!-- ── Dialog card ───────────────────────────────────────────────────────── -->
<div class="fpd-dialog" role="dialog" aria-modal="true">

  <!-- ══ FORM STATE ═══════════════════════════════════════════════════════ -->
  <ng-container *ngIf="state === 'form'">

    <div class="fpd-icon-wrap fpd-icon-wrap--primary">
      <ion-icon name="lock-open-outline"></ion-icon>
    </div>

    <h2 class="fpd-title">Recuperar contraseña</h2>

    <p class="fpd-message">
      Ingresa tu correo electrónico y te enviaremos un enlace para restablecer
      tu contraseña.
    </p>

    <form [formGroup]="emailForm" (ngSubmit)="enviar()" class="fpd-form">

      <div class="fpd-field">
        <ion-item lines="none" class="fpd-item"
          [class.fpd-item--error]="emailForm.get('email')?.touched && emailForm.get('email')?.invalid">
          <ion-icon name="mail-outline" slot="start" class="fpd-icon-input"></ion-icon>
          <ion-input
            type="email"
            inputmode="email"
            placeholder="tuemail@ejemplo.com"
            formControlName="email"
            autocomplete="email">
          </ion-input>
        </ion-item>

        <p class="fpd-field-error"
           *ngIf="emailForm.get('email')?.touched && emailForm.get('email')?.hasError('required')">
          El correo es requerido
        </p>
        <p class="fpd-field-error"
           *ngIf="emailForm.get('email')?.touched && emailForm.get('email')?.hasError('email')">
          Ingresa un correo válido
        </p>
      </div>

      <div class="fpd-actions">
        <button type="button" class="fpd-btn fpd-btn--cancel" (click)="close()">
          Cancelar
        </button>
        <button type="submit" class="fpd-btn fpd-btn--primary" [disabled]="enviando">
          <ion-icon *ngIf="!enviando" name="send-outline"></ion-icon>
          <ion-icon *ngIf="enviando" name="sync-outline" class="fpd-spin"></ion-icon>
          {{ enviando ? 'Enviando…' : 'Enviar enlace' }}
        </button>
      </div>

    </form>

  </ng-container>

  <!-- ══ SUCCESS STATE ════════════════════════════════════════════════════ -->
  <ng-container *ngIf="state === 'success'">

    <div class="fpd-icon-wrap fpd-icon-wrap--success">
      <ion-icon name="mail-outline"></ion-icon>
    </div>

    <h2 class="fpd-title">Revisa tu correo</h2>

    <p class="fpd-message">
      Si el correo está registrado en Agendify,<br>
      te enviamos un enlace para restablecer tu contraseña.
    </p>

    <div class="fpd-actions">
      <button class="fpd-btn fpd-btn--primary fpd-btn--full" (click)="close()">
        Aceptar
      </button>
    </div>

  </ng-container>

</div>
