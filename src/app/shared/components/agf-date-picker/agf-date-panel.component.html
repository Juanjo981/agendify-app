<div class="adp">

  <!-- ── Navigation ─────────────────────────────────────────────────── -->
  <div class="adp-nav">
    <button class="adp-nav__btn" type="button" (click)="prevMonth()" aria-label="Mes anterior">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </button>
    <ng-container *ngIf="showMonthYearSelectors; else defaultMonthLabel">
      <div class="adp-nav__selectors">
        <label class="adp-nav__select-wrap" aria-label="Mes">
          <select class="adp-nav__select" [value]="viewMonth" (change)="onMonthChange($any($event.target).value)">
            <option *ngFor="let month of monthOptions" [value]="month.value">{{ month.label }}</option>
          </select>
        </label>
        <label class="adp-nav__select-wrap adp-nav__select-wrap--year" aria-label="Año">
          <select class="adp-nav__select" [value]="viewYear" (change)="onYearChange($any($event.target).value)">
            <option *ngFor="let year of yearOptions" [value]="year">{{ year }}</option>
          </select>
        </label>
      </div>
    </ng-container>
    <ng-template #defaultMonthLabel>
      <span class="adp-nav__label">{{ monthLabel }}</span>
    </ng-template>
    <button class="adp-nav__btn" type="button" (click)="nextMonth()" aria-label="Mes siguiente">
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </button>
  </div>

  <!-- ── Week-day headers ────────────────────────────────────────────── -->
  <div class="adp-weekdays">
    <span *ngFor="let wd of weekDays">{{ wd }}</span>
  </div>

  <!-- ── Day grid ────────────────────────────────────────────────────── -->
  <div class="adp-grid">
    <ng-container *ngFor="let week of weeks">
      <button
        *ngFor="let d of week"
        type="button"
        class="adp-day"
        [class.adp-day--other]="!d.inMonth"
        [class.adp-day--today]="d.isToday"
        [class.adp-day--selected]="d.iso === value"
        [class.adp-day--disabled]="d.disabled"
        [disabled]="d.disabled"
        (click)="select(d)"
      >{{ d.day }}</button>
    </ng-container>
  </div>

</div>
